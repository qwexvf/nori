get:
  operationId: listUsers
  summary: List all users
  responses:
    "200":
      description: A list of users
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../../components/schemas/user.yaml"
post:
  operationId: createUser
  summary: Create a user
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../../components/schemas/user.yaml"
  responses:
    "201":
      description: User created
